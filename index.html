const dayOf = (y, m, d) => Math.round((Date.UTC(y, m - 1, d) - GENESIS) / DD);
const log10 = (x) => Math.log(x) / Math.LN10;
const K = MODEL.const;

function App() {
  const [beta, setBeta] = useState(K.b);

  const acc = "#f7931a", BLUE = "#5b8def", GRN = "#3fb27f", TEAL = "#2bb6c4", PUR = "#c98bff";
  const TODAY = K.day_now;

  const centre = (day) => {
    const raw = Math.pow(10, logA + beta * log10(day));
    if (day <= TODAY || bend === 0) return raw;
    return raw * Math.pow(1 - bend, (day - TODAY) / 365.25);
  };
  const floor = (day) => centre(day) * floorMult;
  const ceilMult = (day) => 1 + Math.exp(K.cp + K.cq * day);
  const ceil = (day) => centre(day) * ceilMult(day);
  const damped = (day) => K.A0 * Math.exp(-K.lam * (day / 365.25)) * Math.sin(2 * Math.PI * (day - K.phi) / K.T);
  // continuous forward projection anchored to today's actual price
  const proj = (day) => K.price_now * (centre(day) / centre(TODAY)) * Math.pow(10, damped(day) - damped(TODAY));

  // ---- geometry ----
  const W = 1000, H = 560, ML = 60, MR = 16, MT = 16, MB = 30;
  const PW = W - ML - MR, PH = H - MT - MB;
  const dMin = dayOf(2010, 7, 1), dMax = dayOf(2034, 6, 1);
  const pMin = 0.05, pMax = 5e6;
  const xP = (day) => logTime
    ? ML + ((log10(day) - log10(dMin)) / (log10(dMax) - log10(dMin))) * PW
    : ML + ((day - dMin) / (dMax - dMin)) * PW;
  const yP = (p) => MT + (1 - (log10(p) - log10(pMin)) / (log10(pMax) - log10(pMin))) * PH;

  const line = (fn, d0 = dMin, d1 = dMax) => {
    let s = "";
    const N = 260;
    for (let i = 0; i <= N; i++) {
      const lt = log10(d0) + (i / N) * (log10(d1) - log10(d0));
      const day = Math.pow(10, lt), v = fn(day);
      if (v > 0) s += (s ? "L" : "M") + xP(day).toFixed(1) + " " + yP(v).toFixed(1);
    }
    return s;
  };
  const band = () => {
    const N = 200; let up = "", lo = [];

      up += (up ? "L" : "M") + xP(day).toFixed(1) + " " + yP(ceil(day)).toFixed(1);

    return up + lo.reverse().join("") + "Z";

  const tYears = [2026, 2027, 2028, 2029, 2030, 2032, 2035];

            </span>
          </div>
          <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto" }}>
            {priceTicks.map((p) => (
              <g key={p}>
                <line x1={ML} x2={W - MR} y1={yP(p)} y2={yP(p)} stroke="#1b2230" />
                <text x={ML - 6} y={yP(p) + 3} fill="#6b778a" fontSize="10" textAnchor="end">{fmt(p)}</text>
              </g>
            ))}
            {years.map((y) => {
              const d = dayOf(y, 1, 1); if (d < dMin || d > dMax) return null;
              return (<g key={y}><line x1={xP(d)} x2={xP(d)} y1={MT} y2={H - MB} stroke="#141a25" />
                <text x={xP(d)} y={H - MB + 15} fill="#6b778a" fontSize="10" textAnchor="middle">{y}</text></g>);
            })}
            <path d={band()} fill={BLUE} opacity="0.05" />
            <path d={line(floor)} fill="none" stroke={GRN} strokeWidth="1.8" />
            <path d={line(centre)} fill="none" stroke={BLUE} strokeWidth="2.4" />
            <path d={line(ceil)} fill="none" stroke={acc} strokeWidth="1.8" strokeDasharray="2 3" />
            {showCB && <polyline points={cbLine} fill="none" stroke={TEAL} strokeWidth="1.5" opacity="0.85" />}
            <polyline points={histLine} fill="none" stroke="#e6edf5" strokeWidth="1.4" opacity="0.95" />
            {showProj && <path d={line(proj, TODAY, dMax)} fill="none" stroke={PUR} strokeWidth="2" strokeDasharray="5 3" />}
            <line x1={xP(TODAY)} x2={xP(TODAY)} y1={MT} y2={H - MB} stroke="#566" strokeDasharray="4 4" />
            <text x={xP(TODAY) + 4} y={MT + 11} fill="#8b97a8" fontSize="10">today</text>
          </svg>
          <div style={{ fontSize: 11, color: "#6b778a", marginTop: 6 }}>
            Three layers: a power-law trend (blue), a fitted damped cycle with a 3.68-year period decaying 7.9% a year (the purple forward path), and rails set by cost-basis behaviour. The orange ceiling converges onto trend as elastic supply grows; the green floor sits near the network's aggregate cost basis (teal), where capitulation exhausts selling. The narrowing gap is the diminishing-returns and volatility-maturation signature, measured.
          </div>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div style={card}>
            <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 10 }}>Parameters (fitted defaults)</div>
            <Slider label="exponent β" val={beta} min={5.0} max={6.2} step={0.01} set={setBeta} fv={(v) => v.toFixed(2)} />
            <Slider label="intercept logA" val={logA} min={-17.2} max={-15.9} step={0.01} set={setLogA} fv={(v) => v.toFixed(2)} />
            <Slider label="floor (× trend)" val={floorMult} min={0.30} max={0.60} step={0.01} set={setFloorMult} fv={(v) => v.toFixed(2) + "x"} />
            <Slider label="future trend haircut" val={bend} min={0} max={0.12} step={0.005} set={setBend} fv={(v) => (v * 100).toFixed(1) + "%/yr"} />
            <div style={{ fontSize: 11, color: "#6b778a" }}>Raise the haircut to model an S-curve flattening (the main bear case). 0% = pure power law.</div>
          </div>
          <div style={card}>
            <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>Cost basis caps the top</div>
            <div style={{ fontSize: 12, color: "#c3ccd8", marginBottom: 6 }}>MVRV at each cycle top (price ÷ aggregate cost basis):</div>
            {mvrvProj.map(([y, m], i) => (
              <div key={y} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
                <span style={{ width: 40, fontSize: 11, color: i > 3 ? PUR : "#8b97a8" }}>{y}</span>
                <div style={{ flex: 1, background: "#1b2230", borderRadius: 3, height: 12 }}>
                  <div style={{ width: (m / 5.06 * 100) + "%", height: "100%", background: i > 3 ? PUR : acc, borderRadius: 3 }} />
                </div>
                <span style={{ width: 34, fontSize: 11, textAlign: "right" }}>{m.toFixed(2)}</span>
              </div>
            ))}
            <div style={{ fontSize: 11, color: "#6b778a", marginTop: 6 }}>Falling each cycle: rising elastic supply means the market tops at an ever-smaller premium to what holders paid.</div>
          </div>
        </div>
      </div>

      <div style={{ ...card, marginTop: 14 }}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 10 }}>Targets by year (model output, not a forecast)</div>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead><tr style={{ color: "#8b97a8", textAlign: "right" }}>
            <th style={{ textAlign: "left", padding: "4px 8px" }}>year</th>
            <th style={{ padding: "4px 8px", color: GRN }}>floor / capitulation</th>
            <th style={{ padding: "4px 8px", color: BLUE }}>fair value</th>
            <th style={{ padding: "4px 8px", color: acc }}>cycle high</th>
            <th style={{ padding: "4px 8px" }}>trend CAGR</th>
          </tr></thead>
          <tbody>
            {tYears.map((y) => {
              const d = dayOf(y, 12, 31), dp = dayOf(y - 1, 12, 31);
              const cagr = (centre(d) / centre(dp) - 1) * 100;
              return (<tr key={y} style={{ textAlign: "right", borderTop: "1px solid #1b2230" }}>
                <td style={{ textAlign: "left", padding: "6px 8px", fontWeight: 600 }}>{y}</td>
                <td style={{ padding: "6px 8px", color: GRN }}>{fmt(floor(d))}</td>
                <td style={{ padding: "6px 8px", color: "#cdd7e3", fontWeight: 600 }}>{fmt(centre(d))}</td>
                <td style={{ padding: "6px 8px", color: acc }}>{fmt(ceil(d))}</td>
                <td style={{ padding: "6px 8px", color: "#8b97a8" }}>{cagr.toFixed(0)}%</td>
              </tr>);
            })}
          </tbody>
        </table>
        <div style={{ fontSize: 11, color: "#6b778a", marginTop: 10 }}>
          The floor is the dependable line: price has spent almost no sustained time below the network's aggregate cost basis, and that level rises over time. The cycle high is the speculative line, and by the mid-2030s it has all but merged with fair value, which is the model saying the four-year boom-bust is fading into a trend-following asset. Biggest risk: if adoption is sigmoidal rather than a power law, raise the trend haircut and every forward number falls. A positioning map, not a prophecy. Not investment advice.
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
